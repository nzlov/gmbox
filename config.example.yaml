app:
  name: gmbox
  env: dev
  addr: ":8080"
  secret_key: change-me-32-bytes-secret-key-1234

auth:
  init_username: admin
  jwt_expire: 24h
  cookie_name: gmbox_token

db:
  driver: sqlite
  dsn: data/gmbox.db
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 1h

log:
  level: info

mail:
  sync_cron: "*/1 * * * *"
  max_concurrency: 5
  fetch_body: false
  page_size: 50

frontend:
  dist: frontend/dist

microsoft_oauth:
  tenant_id: common
  client_id: ""
  client_secret: ""
  redirect_url: ""
